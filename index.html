<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Online Cinema</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f2027;
background:linear-gradient(to right,#0f2027,#203a43,#2c5364);
color:white;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
background:black;
}

.logo{
font-size:24px;
color:#ffd700;
font-weight:bold;
}

nav ul{
display:flex;
gap:25px;
list-style:none;
}

nav a{
color:white;
text-decoration:none;
}

/* HERO */

.hero{
height:400px;
background:url("https://image.tmdb.org/t/p/original/9BBTo63ANSmhC4e6r62OJFuK2GL.jpg");
background-size:cover;
background-position:center;
display:flex;
align-items:center;
padding-left:80px;
}

.hero h1{
font-size:50px;
}

/* SEARCH */

.search{
text-align:center;
margin:30px;
}

.search input{
padding:10px;
width:350px;
border-radius:6px;
border:none;
}

/* MOVIES */

.movies{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:30px;
padding:40px;
}

.movie{
background:#1b1b1b;
padding:20px;
border-radius:15px;
text-align:center;
transition:0.3s;
}

.movie:hover{
transform:scale(1.05);
}

.movie img{
width:100%;
border-radius:10px;
}

button{
margin-top:8px;
background:red;
border:none;
padding:10px 15px;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#ff3b3b;
}

/* POPUP */

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
}

.popup-content{
background:#111;
padding:20px;
border-radius:10px;
}

/* SEAT */

.seats{
display:grid;
grid-template-columns:repeat(8,40px);
gap:10px;
margin-top:20px;
}

.seat{
width:40px;
height:40px;
background:gray;
cursor:pointer;
}

.seat.selected{
background:limegreen;
}

</style>
</head>

<body>

<nav>
<div class="logo">🎬 Online Cinema</div>

<ul>
<li><a href="#">Home</a></li>
<li><a href="#">Movies</a></li>
<li><a href="#">Coming Soon</a></li>
</ul>

</nav>

<div class="hero">
<h1>Now Showing</h1>
</div>

<div class="search">
<input type="text" id="search" placeholder="Search movie...">
</div>

<div class="movies" id="movieList">

<div class="movie">

<img src="https://image.tmdb.org/t/p/w500/or06FN3Dka5tukK1e9sl16pB3iy.jpg">

<h3>Avengers Endgame</h3>
<p>⭐ 8.4</p>

<button onclick="openTrailer('https://www.youtube.com/embed/TcMBFSGVi1c')">Trailer</button>

<button onclick="openBooking('Avengers Endgame')">Buy Ticket</button>

</div>

<div class="movie">

<img src="https://image.tmdb.org/t/p/w500/1g0dhYtq4irTY1GPXvft6k4YLjm.jpg">

<h3>Spider-Man</h3>
<p>⭐ 8.3</p>

<button onclick="openTrailer('https://www.youtube.com/embed/JfVOs4VSpmA')">Trailer</button>

<button onclick="openBooking('Spider-Man')">Buy Ticket</button>

</div>

<div class="movie">

<img src="https://image.tmdb.org/t/p/w500/qJ2tW6WMUDux911r6m7haRef0WH.jpg">

<h3>The Dark Knight</h3>
<p>⭐ 9.0</p>

<button onclick="openTrailer('https://www.youtube.com/embed/EXeTwQWrcwY')">Trailer</button>

<button onclick="openBooking('The Dark Knight')">Buy Ticket</button>

</div>

<div class="movie">

<img src="https://image.tmdb.org/t/p/w500/gEU2QniE6E77NI6lCU6MxlNBvIx.jpg">

<h3>Interstellar</h3>
<p>⭐ 8.6</p>

<button onclick="openTrailer('https://www.youtube.com/embed/zSWdZVtXT7E')">Trailer</button>

<button onclick="openBooking('Interstellar')">Buy Ticket</button>

</div>

</div>

<!-- TRAILER -->

<div class="popup" id="trailerPopup">

<div class="popup-content">

<iframe id="trailerVideo" width="700" height="400"></iframe>

<br><br>

<button onclick="closeTrailer()">Close</button>

</div>

</div>

<!-- BOOKING -->

<div class="popup" id="bookingPopup">

<div class="popup-content">

<h2 id="movieTitle"></h2>

<p>Select Showtime</p>

<button onclick="setTime('12:30')">12:30</button>
<button onclick="setTime('15:00')">15:00</button>
<button onclick="setTime('18:30')">18:30</button>
<button onclick="setTime('21:00')">21:00</button>

<h3>Select Seat</h3>

<div class="seats" id="seatArea"></div>

<br>

<button onclick="checkout()">Checkout</button>
<button onclick="closeBooking()">Close</button>

</div>

</div>

<script>

let selectedMovie=""
let selectedTime=""
let selectedSeats=[]

function openTrailer(link){

document.getElementById("trailerPopup").style.display="flex"
document.getElementById("trailerVideo").src=link

}

function closeTrailer(){

document.getElementById("trailerPopup").style.display="none"
document.getElementById("trailerVideo").src=""

}

function openBooking(movie){

selectedMovie=movie

document.getElementById("movieTitle").innerText=movie

document.getElementById("bookingPopup").style.display="flex"

}

function closeBooking(){

document.getElementById("bookingPopup").style.display="none"

}

function setTime(time){

selectedTime=time
alert("Showtime selected: "+time)

}

/* CREATE SEATS */

let seatArea=document.getElementById("seatArea")

for(let i=1;i<=32;i++){

let seat=document.createElement("div")

seat.className="seat"

seat.innerText=i

seat.onclick=function(){

seat.classList.toggle("selected")

selectedSeats.push(i)

}

seatArea.appendChild(seat)

}

function checkout(){

alert(
"Movie: "+selectedMovie+
"\nTime: "+selectedTime+
"\nSeats: "+selectedSeats+
"\nTotal: Rp "+selectedSeats.length*35000
)

}

document.getElementById("search").addEventListener("keyup",function(){

let value=this.value.toLowerCase()

document.querySelectorAll(".movie").forEach(movie=>{

let title=movie.innerText.toLowerCase()

movie.style.display=title.includes(value)?"block":"none"

})

})

</script>

</body>
</html>
