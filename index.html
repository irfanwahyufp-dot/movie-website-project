<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Online Cinema</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f2027;
background:linear-gradient(to right,#0f2027,#203a43,#2c5364);
color:white;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
background:black;
}

.logo{
font-size:20px;
color:#ffd700;
font-weight:bold;
}

nav ul{
display:flex;
gap:20px;
list-style:none;
cursor:pointer;
}

/* HERO */

.hero{
height:300px;
background:url("https://image.tmdb.org/t/p/original/9BBTo63ANSmhC4e6r62OJFuK2GL.jpg");
background-size:cover;
display:flex;
align-items:center;
padding-left:40px;
}

.hero h1{
font-size:40px;
}

/* SEARCH */

.search{
text-align:center;
margin:20px;
}

.search input{
padding:10px;
width:300px;
border-radius:6px;
border:none;
}

/* MOVIES */

.movies{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
padding:30px;
}

.movie{
background:#1b1b1b;
padding:15px;
border-radius:12px;
text-align:center;
transition:0.3s;
}

.movie:hover{
transform:scale(1.05);
}

.movie img{
width:100%;
border-radius:8px;
}

button{
margin-top:6px;
background:red;
border:none;
padding:8px 12px;
color:white;
border-radius:6px;
cursor:pointer;
}

/* POPUP */

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
}

.popup-content{
background:#111;
padding:25px;
border-radius:10px;
text-align:center;
max-width:400px;
}

/* SEATS */

.seats{
display:grid;
grid-template-columns:repeat(6,40px);
gap:8px;
justify-content:center;
margin-top:10px;
}

.seat{
width:40px;
height:40px;
background:gray;
cursor:pointer;
}

.seat.selected{
background:limegreen;
}

/* TICKET */

.ticket{
background:#222;
padding:15px;
border-radius:8px;
margin-top:10px;
}

/* MOBILE */

@media(max-width:600px){

.hero h1{
font-size:28px;
}

.search input{
width:90%;
}

nav{
flex-direction:column;
gap:10px;
}

}

</style>
</head>

<body>

<nav>

<div class="logo">🎬 Online Cinema</div>

<ul>

<li onclick="showHome()">Home</li>
<li onclick="showTickets()">My Ticket</li>

</ul>

</nav>

<div class="hero">
<h1>Now Showing</h1>
</div>

<div class="search">
<input type="text" id="search" placeholder="Search movie...">
</div>

<div class="movies" id="movieList">

<div class="movie">

<img src="https://image.tmdb.org/t/p/w500/or06FN3Dka5tukK1e9sl16pB3iy.jpg">

<h3>Avengers Endgame</h3>

<button onclick="openBooking('Avengers Endgame')">Buy Ticket</button>

</div>

<div class="movie">

<img src="https://image.tmdb.org/t/p/w500/1g0dhYtq4irTY1GPXvft6k4YLjm.jpg">

<h3>Spider-Man</h3>

<button onclick="openBooking('Spider-Man')">Buy Ticket</button>

</div>

<div class="movie">

<img src="https://image.tmdb.org/t/p/w500/qJ2tW6WMUDux911r6m7haRef0WH.jpg">

<h3>The Dark Knight</h3>

<button onclick="openBooking('The Dark Knight')">Buy Ticket</button>

</div>

<div class="movie">

<img src="https://image.tmdb.org/t/p/w500/gEU2QniE6E77NI6lCU6MxlNBvIx.jpg">

<h3>Interstellar</h3>

<button onclick="openBooking('Interstellar')">Buy Ticket</button>

</div>

</div>

<!-- BOOKING -->

<div class="popup" id="bookingPopup">

<div class="popup-content">

<h2 id="movieTitle"></h2>

<p>Select Time</p>

<button onclick="setTime('12:30')">12:30</button>
<button onclick="setTime('15:00')">15:00</button>
<button onclick="setTime('18:30')">18:30</button>

<h3>Select Seat</h3>

<div class="seats" id="seatArea"></div>

<br>

<button onclick="checkout()">Checkout</button>

<button onclick="closeBooking()">Close</button>

</div>

</div>

<!-- TICKET -->

<div class="popup" id="ticketPopup">

<div class="popup-content">

<h2>Your Ticket</h2>

<div id="ticketInfo"></div>

<button onclick="closeTicket()">Close</button>

</div>

</div>

<!-- HISTORY -->

<div class="popup" id="historyPopup">

<div class="popup-content">

<h2>Ticket History</h2>

<div id="historyList"></div>

<button onclick="closeHistory()">Close</button>

</div>

</div>

<script>

let selectedMovie=""
let selectedTime=""
let selectedSeats=[]

function openBooking(movie){

selectedMovie=movie
selectedSeats=[]

document.getElementById("movieTitle").innerText=movie

document.getElementById("bookingPopup").style.display="flex"

}

function closeBooking(){

document.getElementById("bookingPopup").style.display="none"

}

function setTime(time){

selectedTime=time

}

/* CREATE SEATS */

let seatArea=document.getElementById("seatArea")

for(let i=1;i<=30;i++){

let seat=document.createElement("div")

seat.className="seat"

seat.innerText=i

seat.onclick=function(){

seat.classList.toggle("selected")

selectedSeats.push(i)

}

seatArea.appendChild(seat)

}

function checkout(){

let total=selectedSeats.length*35000

let ticket={

movie:selectedMovie,
time:selectedTime,
seats:selectedSeats,
total:total

}

let history=JSON.parse(localStorage.getItem("tickets")) || []

history.push(ticket)

localStorage.setItem("tickets",JSON.stringify(history))

document.getElementById("ticketInfo").innerHTML=

"Movie: "+ticket.movie+"<br>"+
"Time: "+ticket.time+"<br>"+
"Seats: "+ticket.seats+"<br>"+
"Total: Rp "+ticket.total

document.getElementById("bookingPopup").style.display="none"

document.getElementById("ticketPopup").style.display="flex"

}

function closeTicket(){

document.getElementById("ticketPopup").style.display="none"

}

function showTickets(){

let history=JSON.parse(localStorage.getItem("tickets")) || []

let html=""

history.forEach(t=>{

html+=

"<div class='ticket'>"+
"Movie: "+t.movie+"<br>"+
"Time: "+t.time+"<br>"+
"Seats: "+t.seats+"<br>"+
"Total: Rp "+t.total+
"</div>"

})

document.getElementById("historyList").innerHTML=html

document.getElementById("historyPopup").style.display="flex"

}

function closeHistory(){

document.getElementById("historyPopup").style.display="none"

}

function showHome(){

location.reload()

}

document.getElementById("search").addEventListener("keyup",function(){

let value=this.value.toLowerCase()

document.querySelectorAll(".movie").forEach(movie=>{

let title=movie.innerText.toLowerCase()

movie.style.display=title.includes(value)?"block":"none"

})

})

</script>

</body>
</html>
