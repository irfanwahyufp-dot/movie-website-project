<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FannFlix</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="sidebar">

<div class="profile">

<img src="images/profile.jpg">

<div>
<h3>Fann</h3>
<p>Switch Profiles</p>
</div>

</div>

<ul>

<li>🏠 Home</li>
<li>🔎 Search</li>
<li>🔥 New & Popular</li>
<li>🎬 Movies</li>
<li>📺 TV Shows</li>
<li>❤️ My List</li>

</ul>

</div>


<div class="main">

<div class="hero">

<img id="hero-img">

<div class="hero-info">

<h1 id="hero-title"></h1>

<p id="hero-desc"></p>

<button class="play">▶ Play</button>
<button class="info">More Info</button>

</div>

</div>


<div class="search-box">

<input 
type="text"
placeholder="Search movies..."
id="search"
onkeyup="searchMovie()"
/>

</div>


<h2>Trending</h2>
<div class="movie-row" id="movies"></div>

</div>

<script src="script.js"></script>

</body>
</html>
