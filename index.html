<!DOCTYPE html>
<html>
<head>

<title>XXI Cinema</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
margin:0;
text-align:center;
}

header{
background:black;
padding:15px;
font-size:22px;
font-weight:bold;
}

.movies{
display:flex;
justify-content:center;
gap:20px;
margin-top:30px;
flex-wrap:wrap;
}

.movie{
width:200px;
background:#1c1c1c;
padding:10px;
border-radius:10px;
}

.movie img{
width:100%;
border-radius:8px;
}

.movie button{
width:100%;
margin-top:8px;
background:gold;
border:none;
padding:8px;
border-radius:6px;
cursor:pointer;
}

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
}

.popup-content{
background:#1a1a1a;
padding:25px;
border-radius:10px;
width:300px;
}

select,button{
padding:8px;
margin-top:8px;
}

.ticket-box{
background:#1c1c1c;
padding:10px;
margin:10px auto;
width:250px;
border-radius:8px;
}

</style>

</head>

<body>

<header>XXI Cinema</header>

<h2>Now Playing</h2>

<div class="movies">

<div class="movie">

<img src="https://image.tmdb.org/t/p/w500/or06FN3Dka5tukK1e9sl16pB3iy.jpg">

<h3>Avengers Endgame</h3>

<button onclick="buyTicket('Avengers Endgame')">
Buy Ticket
</button>

</div>

<div class="movie">

<img src="https://image.tmdb.org/t/p/w500/qJ2tW6WMUDux911r6m7haRef0WH.jpg">

<h3>The Dark Knight</h3>

<button onclick="buyTicket('The Dark Knight')">
Buy Ticket
</button>

</div>

<div class="movie">

<img src="https://image.tmdb.org/t/p/w500/rAiYTfKGqDCRIIqo664sY9XZIvQ.jpg">

<h3>Interstellar</h3>

<button onclick="buyTicket('Interstellar')">
Buy Ticket
</button>

</div>

</div>

<h2>Ticket History</h2>

<div id="ticketHistory"></div>

<!-- POPUP PAYMENT -->

<div id="paymentPopup" class="popup">

<div class="popup-content">

<h2>Payment</h2>

<p>Total Payment</p>

<h3>Rp 35000</h3>

<select id="paymentMethod" onchange="showPaymentOption()">

<option value="">Pilih Metode</option>

<option value="qris">QRIS</option>

<option value="ewallet">E-Wallet / Bank</option>

</select>

<!-- QRIS -->

<div id="qrisOption" style="display:none">

<p>Scan QRIS</p>

<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=XXICINEMA_PAYMENT">

<br>

<button onclick="confirmPayment()">
Saya Sudah Bayar
</button>

</div>

<!-- EWALLET -->

<div id="ewalletOption" style="display:none">

<p>Pilih E-Wallet / Bank</p>

<select id="walletList">

<option>GoPay</option>
<option>DANA</option>
<option>ShopeePay</option>
<option>OVO</option>
<option>Bank BCA</option>
<option>Bank BRI</option>
<option>Bank Mandiri</option>

</select>

<br>

<button onclick="confirmPayment()">
Bayar
</button>

</div>

<br>

<button onclick="closePayment()">Cancel</button>

</div>

</div>

<!-- HUBUNGKAN JAVASCRIPT -->

<script src="script.js"></script>

</body>
</html>
