<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>XXI Cinema</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0d0d0d;
color:white;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
background:black;
border-bottom:2px solid gold;
}

.logo{
font-size:22px;
color:gold;
font-weight:bold;
}

nav ul{
display:flex;
gap:25px;
list-style:none;
cursor:pointer;
}

/* HERO */

.hero{
height:380px;
overflow:hidden;
}

.hero img{
width:100%;
height:100%;
object-fit:cover;
}

/* SEARCH */

.search{
text-align:center;
margin:20px;
}

.search input{
padding:10px;
width:320px;
border-radius:6px;
border:none;
}

/* CATEGORY */

.category{
display:flex;
gap:10px;
justify-content:center;
margin-bottom:20px;
}

.category button{
background:#222;
border:none;
color:white;
padding:8px 15px;
border-radius:20px;
cursor:pointer;
}

.category button:hover{
background:gold;
color:black;
}

/* MOVIES */

.movies{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
padding:30px;
}

.movie{
background:#1b1b1b;
padding:12px;
border-radius:10px;
transition:0.3s;
text-align:center;
}

.movie:hover{
transform:scale(1.05);
}

.movie img{
width:100%;
border-radius:8px;
}

.movie button{
width:100%;
margin-top:5px;
background:gold;
border:none;
padding:8px;
border-radius:6px;
cursor:pointer;
}

/* POPUP */

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
}

.popup-content{
background:#111;
padding:25px;
border-radius:10px;
text-align:center;
max-width:420px;
}

/* SEATS */

.seats{
display:grid;
grid-template-columns:repeat(6,40px);
gap:8px;
justify-content:center;
margin-top:10px;
}

.seat{
width:40px;
height:40px;
background:gray;
cursor:pointer;
}

.seat.selected{
background:gold;
}

/* TICKET */

.ticket{
background:#222;
padding:15px;
border-radius:8px;
margin-top:10px;
}

/* MOBILE */

@media(max-width:600px){

.hero{
height:250px;
}

nav{
flex-direction:column;
gap:10px;
}

.search input{
width:90%;
}

}

</style>
</head>

<body>

<nav>

<div class="logo">🎬 XXI Cinema</div>

<ul>

<li onclick="showHome()">Home</li>
<li onclick="showTickets()">My Ticket</li>

</ul>

</nav>

<!-- HERO SLIDER -->

<div class="hero">

<img id="banner" src="https://image.tmdb.org/t/p/original/9BBTo63ANSmhC4e6r62OJFuK2GL.jpg">

</div>

<!-- SEARCH -->

<div class="search">
<input type="text" id="search" placeholder="Search movie...">
</div>

<!-- CATEGORY -->

<div class="category">

<button>All</button>
<button>Action</button>
<button>Sci-Fi</button>
<button>Adventure</button>

</div>

<!-- MOVIES -->

<div class="movies">

<div class="movie">
<img src="https://image.tmdb.org/t/p/w500/or06FN3Dka5tukK1e9sl16pB3iy.jpg">
<h3>Avengers Endgame</h3>
<p>⭐ 8.4</p>
<button onclick="openBooking('Avengers Endgame')">Buy Ticket</button>
</div>

<div class="movie">
<img src="https://image.tmdb.org/t/p/w500/1g0dhYtq4irTY1GPXvft6k4YLjm.jpg">
<h3>Spider-Man</h3>
<p>⭐ 8.3</p>
<button onclick="openBooking('Spider-Man')">Buy Ticket</button>
</div>

<div class="movie">
<img src="https://image.tmdb.org/t/p/w500/qJ2tW6WMUDux911r6m7haRef0WH.jpg">
<h3>The Dark Knight</h3>
<p>⭐ 9.0</p>
<button onclick="openBooking('The Dark Knight')">Buy Ticket</button>
</div>

<div class="movie">
<img src="https://image.tmdb.org/t/p/w500/gEU2QniE6E77NI6lCU6MxlNBvIx.jpg">
<h3>Interstellar</h3>
<p>⭐ 8.6</p>
<button onclick="openBooking('Interstellar')">Buy Ticket</button>
</div>

</div>

<!-- BOOKING -->

<div class="popup" id="bookingPopup">

<div class="popup-content">

<h2 id="movieTitle"></h2>

<p>Select Time</p>

<button onclick="setTime('12:30')">12:30</button>
<button onclick="setTime('15:00')">15:00</button>
<button onclick="setTime('18:30')">18:30</button>

<h3>Select Seat</h3>

<div class="seats" id="seatArea"></div>

<br>

<button onclick="goPayment()">Checkout</button>
<button onclick="closeBooking()">Close</button>

</div>

</div>

<!-- PAYMENT -->

<div class="popup" id="paymentPopup">

<div class="popup-content">

<h2>Payment</h2>

<p>Total Payment</p>

<h3 id="totalPrice"></h3>

<button onclick="showQR()">Pay with QRIS / E-Wallet</button>

<br><br>

<div id="qrArea" style="display:none">

<img src="https://upload.wikimedia.org/wikipedia/commons/5/5f/QRIS_logo.svg" width="120">

<br><br>

<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=CINEMA-PAYMENT-DEMO">

<p>Scan QR to Pay</p>

<button onclick="finishPayment()">I Already Paid</button>

</div>

<br>

<button onclick="closePayment()">Cancel</button>

</div>

</div>

<!-- TICKET -->

<div class="popup" id="ticketPopup">

<div class="popup-content">

<h2>Your Ticket</h2>

<div id="ticketInfo"></div>

<button onclick="closeTicket()">Close</button>

</div>

</div>

<!-- HISTORY -->

<div class="popup" id="historyPopup">

<div class="popup-content">

<h2>Ticket History</h2>

<div id="historyList"></div>

<button onclick="closeHistory()">Close</button>

</div>

</div>

<script>

/* HERO SLIDER */

let banners=[
"https://image.tmdb.org/t/p/original/9BBTo63ANSmhC4e6r62OJFuK2GL.jpg",
"https://image.tmdb.org/t/p/original/5YZbUmjbMa3ClvSW1Wj3D6XGolb.jpg",
"https://image.tmdb.org/t/p/original/y2Ca1neKke2mGPMaHzlCNDVZqsK.jpg"
]

let index=0

setInterval(()=>{

index++

if(index>=banners.length) index=0

document.getElementById("banner").src=banners[index]

},4000)

/* BOOKING */

let selectedMovie=""
let selectedTime=""
let selectedSeats=[]

function openBooking(movie){

selectedMovie=movie
selectedSeats=[]

document.getElementById("movieTitle").innerText=movie
document.getElementById("bookingPopup").style.display="flex"

}

function closeBooking(){
document.getElementById("bookingPopup").style.display="none"
}

function setTime(time){
selectedTime=time
}

/* SEATS */

let seatArea=document.getElementById("seatArea")

for(let i=1;i<=30;i++){

let seat=document.createElement("div")

seat.className="seat"
seat.innerText=i

seat.onclick=function(){

seat.classList.toggle("selected")

if(selectedSeats.includes(i)){
selectedSeats=selectedSeats.filter(s=>s!==i)
}else{
selectedSeats.push(i)
}

}

seatArea.appendChild(seat)

}

/* PAYMENT */

function goPayment(){

let total=selectedSeats.length*35000

document.getElementById("totalPrice").innerText="Rp "+total

document.getElementById("bookingPopup").style.display="none"

document.getElementById("paymentPopup").style.display="flex"

}

function showQR(){

document.getElementById("qrArea").style.display="block"

}

function closePayment(){

document.getElementById("paymentPopup").style.display="none"

}

function finishPayment(){

let total=selectedSeats.length*35000

let ticket={
movie:selectedMovie,
time:selectedTime,
seats:selectedSeats,
total:total
}

let history=JSON.parse(localStorage.getItem("tickets"))||[]

history.push(ticket)

localStorage.setItem("tickets",JSON.stringify(history))

document.getElementById("ticketInfo").innerHTML=

"Movie: "+ticket.movie+"<br>"+
"Time: "+ticket.time+"<br>"+
"Seats: "+ticket.seats+"<br>"+
"Total: Rp "+ticket.total+"<br>"+
"Payment: QRIS"

document.getElementById("paymentPopup").style.display="none"

document.getElementById("ticketPopup").style.display="flex"

}

/* HISTORY */

function showTickets(){

let history=JSON.parse(localStorage.getItem("tickets"))||[]

let html=""

history.forEach(t=>{

html+="<div class='ticket'>"+
"Movie: "+t.movie+"<br>"+
"Time: "+t.time+"<br>"+
"Seats: "+t.seats+"<br>"+
"Total: Rp "+t.total+
"</div>"

})

document.getElementById("historyList").innerHTML=html

document.getElementById("historyPopup").style.display="flex"

}

function closeHistory(){

document.getElementById("historyPopup").style.display="none"

}

function closeTicket(){

document.getElementById("ticketPopup").style.display="none"

}

function showHome(){

location.reload()

}

/* SEARCH */

document.getElementById("search").addEventListener("keyup",function(){

let value=this.value.toLowerCase()

document.querySelectorAll(".movie").forEach(movie=>{

let title=movie.innerText.toLowerCase()

movie.style.display=title.includes(value)?"block":"none"

})

})

</script>

</body>
</html>
