<!DOCTYPE html>
<html>
<head>

<title>XXI Cinema</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>XXI Cinema</h1>

<nav>
<a href="#">Home</a>
<a href="#">Now Playing</a>
<a href="#">Coming Soon</a>
</nav>

</header>


<section class="movies">

<div class="movie">

<img src="https://m.media-amazon.com/images/I/81ExhpBEbHL.jpg">

<h3>Avengers Endgame</h3>

⭐ ⭐ ⭐ ⭐ ⭐

<br><br>

<button onclick="watchTrailer('https://www.youtube.com/embed/TcMBFSGVi1c')">
Trailer
</button>

<button onclick="buyTicket('Avengers Endgame')">
Buy Ticket
</button>

</div>


<div class="movie">

<img src="https://m.media-amazon.com/images/I/51EbJjlLgRL.jpg">

<h3>The Dark Knight</h3>

⭐ ⭐ ⭐ ⭐ ⭐

<br><br>

<button onclick="watchTrailer('https://www.youtube.com/embed/EXeTwQWrcwY')">
Trailer
</button>

<button onclick="buyTicket('The Dark Knight')">
Buy Ticket
</button>

</div>


<div class="movie">

<img src="https://m.media-amazon.com/images/I/71yVq+Y8i-L._AC_SL1000_.jpg">

<h3>Interstellar</h3>

⭐ ⭐ ⭐ ⭐ ⭐

<br><br>

<button onclick="watchTrailer('https://www.youtube.com/embed/zSWdZVtXT7E')">
Trailer
</button>

<button onclick="buyTicket('Interstellar')">
Buy Ticket
</button>

</div>

</section>


<h2 class="history-title">Riwayat Tiket</h2>

<div id="ticketHistory"></div>


<!-- Trailer Popup -->

<div id="trailerPopup" class="popup">

<div class="popup-content">

<iframe id="trailerFrame" width="400" height="250"></iframe>

<button onclick="closeTrailer()">Close</button>

</div>

</div>


<!-- Seat Picker -->

<div id="seatPopup" class="popup">

<div class="popup-content">

<h3>Pilih Kursi</h3>

<div id="seats"></div>

<button onclick="confirmSeat()">Lanjut Pembayaran</button>

</div>

</div>


<!-- Payment -->

<div id="paymentPopup" class="popup">

<div class="popup-content">

<h3>Pilih Pembayaran</h3>

<select id="paymentMethod" onchange="changePayment()">

<option value="">Pilih metode</option>
<option value="qris">QRIS</option>
<option value="ewallet">E-Wallet</option>

</select>


<div id="qrisBox" style="display:none">

<img id="qrTicket">

</div>


<div id="ewalletBox" style="display:none">

<select id="wallet">

<option>GoPay</option>
<option>DANA</option>
<option>ShopeePay</option>
<option>OVO</option>
<option>Bank BCA</option>
<option>Bank BRI</option>

</select>

</div>

<button onclick="payNow()">Bayar</button>

</div>

</div>


<script src="script.js"></script>

</body>
</html>
