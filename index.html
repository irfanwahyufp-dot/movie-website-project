<!DOCTYPE html>
<html>

<head>
<title>FannFlix</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">

<div class="profile">
<img src="images/profile.jpg">
<h3>Fann</h3>
</div>

<ul class="menu">
<li>Home</li>
<li>Movies</li>
<li>My List</li>
</ul>

</div>


<!-- MAIN -->
<div class="main">

<!-- HERO SLIDER -->
<div class="hero">

<img id="hero-img">

<div class="hero-text">
<h1 id="hero-title"></h1>
<p id="hero-desc"></p>
</div>

</div>


<!-- SEARCH -->
<div class="search-box">

<input
type="text"
id="search"
placeholder="Search movie..."
onkeyup="searchMovie()"
/>

</div>


<h2>Popular Movies</h2>

<div class="movies" id="movie-list"></div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
