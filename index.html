<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>FannFlix</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="profile">

<img src="images/profile.jpg">

<div>
<h4>Fann</h4>
<p>Switch Profiles</p>

</div>
</div>
<ul>

<li>🔍 Search</li>
<li class="active">🏠 Home</li>
<li>🔥 New & Popular</li>
<li>📺 TV Shows</li>
<li>🎬 Movies</li>
<li>📁 Categories</li>
<li>➕ My List</li>

</ul>

</div>


<!-- MAIN -->

<div class="main">

<!-- HERO -->

<div class="hero">

<div class="hero-overlay"></div>

<div class="hero-content">

<h1 id="heroTitle"></h1>

<p id="heroDesc"></p>

<div class="hero-buttons">

<button id="heroPlay">▶ Play Trailer</button>

</div>

</div>

</div>


<!-- MOVIE ROWS -->

<section class="row">

<h2>Trending Now</h2>

<div class="movies" id="trending"></div>

</section>


<section class="row">

<h2>Popular</h2>

<div class="movies" id="popular"></div>

</section>


<section class="row">

<h2>Top Rated</h2>

<div class="movies" id="top"></div>

</section>

</div>


<!-- TRAILER POPUP -->

<div id="trailerModal" class="modal">

<div class="modal-content">

<span id="close">✖</span>

<iframe id="trailerFrame" allowfullscreen></iframe>

</div>

</div>


<script src="script.js"></script>

</body>
</html>
