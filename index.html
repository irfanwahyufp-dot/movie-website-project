<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FannFlix</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">

<h2 class="logo">FannFlix</h2>

<ul class="menu">
<li>Home</li>
<li>Movies</li>
<li>Series</li>
<li>My List</li>
</ul>

<div class="profile">
<img src="profile.jpg" alt="">
<p>Irfan</p>
</div>

</div>


<!-- MAIN CONTENT -->
<div class="main">

<h1>Trending Movies</h1>

<div class="movie-container">

<div class="movie-card">
<img src="moneyheist.jpg">
<h3>Money Heist</h3>
</div>

<div class="movie-card">
<img src="wednesday.jpg">
<h3>Wednesday</h3>
</div>

<div class="movie-card">
<img src="stangerthings.jpg">
<h3>Stranger Things</h3>
</div>

<div class="movie-card">
<img src="witcher.jpg">
<h3>The Witcher</h3>
</div>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
