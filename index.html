<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Online Cinema</title>

<style>

body{
font-family:Arial;
margin:0;
background:#0f2027;
background:linear-gradient(to right,#0f2027,#203a43,#2c5364);
color:white;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
padding:20px 60px;
background:black;
}

.logo{
font-size:24px;
color:#ffd700;
font-weight:bold;
}

nav ul{
display:flex;
gap:25px;
list-style:none;
}

nav a{
color:white;
text-decoration:none;
}

/* SEARCH */

.search{
text-align:center;
margin:30px;
}

.search input{
padding:10px;
width:300px;
border-radius:6px;
border:none;
}

/* MOVIE GRID */

.movies{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:30px;
padding:40px;
}

.movie{
background:#1b1b1b;
padding:20px;
border-radius:15px;
text-align:center;
transition:0.3s;
}

.movie:hover{
transform:scale(1.05);
}

.movie img{
width:100%;
border-radius:10px;
}

button{
margin-top:8px;
background:red;
border:none;
padding:10px 15px;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#ff3b3b;
}

/* POPUP */

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}

.popup-content{
background:#111;
padding:20px;
border-radius:10px;
}

.seats{
display:grid;
grid-template-columns:repeat(6,40px);
gap:10px;
margin-top:10px;
}

.seat{
width:40px;
height:40px;
background:gray;
cursor:pointer;
}

.seat.selected{
background:limegreen;
}

</style>
</head>

<body>

<nav>
<div class="logo">🎬 Online Cinema</div>

<ul>
<li><a href="#">Home</a></li>
<li><a href="#">Movies</a></li>
<li><a href="#">Coming Soon</a></li>
</ul>

</nav>

<div class="search">
<input type="text" id="search" placeholder="Search movie...">
</div>

<div class="movies" id="movieList">

<div class="movie">
<img src="https://image.tmdb.org/t/p/w500/or06FN3Dka5tukK1e9sl16pB3iy.jpg">
<h3>Avengers Endgame</h3>
<p>⭐ 8.4</p>
<button onclick="openTrailer('https://www.youtube.com/embed/TcMBFSGVi1c')">Trailer</button>
<button onclick="openBooking()">Pesan Tiket</button>
</div>

<div class="movie">
<img src="https://image.tmdb.org/t/p/w500/1g0dhYtq4irTY1GPXvft6k4YLjm.jpg">
<h3>Spider-Man</h3>
<p>⭐ 8.3</p>
<button onclick="openTrailer('https://www.youtube.com/embed/JfVOs4VSpmA')">Trailer</button>
<button onclick="openBooking()">Pesan Tiket</button>
</div>

<div class="movie">
<img src="https://image.tmdb.org/t/p/w500/qJ2tW6WMUDux911r6m7haRef0WH.jpg">
<h3>The Dark Knight</h3>
<p>⭐ 9.0</p>
<button onclick="openTrailer('https://www.youtube.com/embed/EXeTwQWrcwY')">Trailer</button>
<button onclick="openBooking()">Pesan Tiket</button>
</div>

<div class="movie">
<img src="https://image.tmdb.org/t/p/w500/gEU2QniE6E77NI6lCU6MxlNBvIx.jpg">
<h3>Interstellar</h3>
<p>⭐ 8.6</p>
<button onclick="openTrailer('https://www.youtube.com/embed/zSWdZVtXT7E')">Trailer</button>
<button onclick="openBooking()">Pesan Tiket</button>
</div>

</div>

<!-- TRAILER POPUP -->

<div class="popup" id="trailerPopup">
<div class="popup-content">
<iframe id="trailerVideo" width="560" height="315"></iframe>
<br><br>
<button onclick="closeTrailer()">Close</button>
</div>
</div>

<!-- BOOKING POPUP -->

<div class="popup" id="bookingPopup">

<div class="popup-content">

<h2>Select Seat</h2>

<div class="seats">

<div class="seat"></div>
<div class="seat"></div>
<div class="seat"></div>
<div class="seat"></div>
<div class="seat"></div>
<div class="seat"></div>

<div class="seat"></div>
<div class="seat"></div>
<div class="seat"></div>
<div class="seat"></div>
<div class="seat"></div>
<div class="seat"></div>

</div>

<br>

<button onclick="alert('Ticket Booked!')">Confirm Ticket</button>
<button onclick="closeBooking()">Close</button>

</div>

</div>

<script>

/* TRAILER */

function openTrailer(link){

document.getElementById("trailerPopup").style.display="flex";
document.getElementById("trailerVideo").src=link;

}

function closeTrailer(){

document.getElementById("trailerPopup").style.display="none";
document.getElementById("trailerVideo").src="";

}

/* BOOKING */

function openBooking(){

document.getElementById("bookingPopup").style.display="flex";

}

function closeBooking(){

document.getElementById("bookingPopup").style.display="none";

}

/* SEAT SELECT */

document.querySelectorAll(".seat").forEach(seat=>{
seat.onclick=()=>{
seat.classList.toggle("selected")
}
})

/* SEARCH */

document.getElementById("search").addEventListener("keyup",function(){

let value=this.value.toLowerCase()

document.querySelectorAll(".movie").forEach(movie=>{

let title=movie.innerText.toLowerCase()

movie.style.display=title.includes(value) ? "block" : "none"

})

})

</script>

</body>
</html>
