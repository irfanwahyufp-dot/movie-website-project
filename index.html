<!DOCTYPE html>
<html>
<head>

<title>XXI Cinema</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="navbar">

<h1 class="logo">XXI Cinema</h1>

<nav>

<a href="#">Home</a>
<a href="#">Movies</a>
<a href="#">Coming Soon</a>

</nav>

</header>


<section class="hero">

<h2>Now Showing</h2>
<p>Book your movie tickets online</p>

</section>


<section class="movies">

<div class="movie-card">

<img src="https://image.tmdb.org/t/p/w500/or06FN3Dka5tukK1e9sl16pB3iy.jpg">

<div class="movie-info">

<h3>Avengers Endgame</h3>

<div class="rating">⭐⭐⭐⭐⭐</div>

<button onclick="watchTrailer('https://www.youtube.com/embed/TcMBFSGVi1c')">
Watch Trailer
</button>

<button onclick="buyTicket('Avengers Endgame')">
Buy Ticket
</button>

</div>

</div>


<div class="movie-card">

<img src="https://image.tmdb.org/t/p/w500/qJ2tW6WMUDux911r6m7haRef0WH.jpg">

<div class="movie-info">

<h3>The Dark Knight</h3>

<div class="rating">⭐⭐⭐⭐⭐</div>

<button onclick="watchTrailer('https://www.youtube.com/embed/EXeTwQWrcwY')">
Watch Trailer
</button>

<button onclick="buyTicket('The Dark Knight')">
Buy Ticket
</button>

</div>

</div>


<div class="movie-card">

<img src="https://image.tmdb.org/t/p/w500/gEU2QniE6E77NI6lCU6MxlNBvIx.jpg">

<div class="movie-info">

<h3>Interstellar</h3>

<div class="rating">⭐⭐⭐⭐⭐</div>

<button onclick="watchTrailer('https://www.youtube.com/embed/zSWdZVtXT7E')">
Watch Trailer
</button>

<button onclick="buyTicket('Interstellar')">
Buy Ticket
</button>

</div>

</div>

</section>


<section class="tickets">

<h2>Ticket History</h2>

<div id="ticketHistory"></div>

</section>


<div id="trailerPopup" class="popup">

<div class="popup-content">

<iframe id="trailerFrame" width="600" height="350"></iframe>

<button onclick="closeTrailer()">Close</button>

</div>

</div>


<div id="seatPopup" class="popup">

<div class="popup-content">

<h3>Select Seat</h3>

<div id="seats"></div>

<button onclick="confirmSeat()">Continue</button>

</div>

</div>


<div id="paymentPopup" class="popup">

<div class="popup-content">

<h3>Payment</h3>

<select id="paymentMethod" onchange="changePayment()">

<option value="">Select Method</option>
<option value="qris">QRIS</option>
<option value="ewallet">E-Wallet</option>

</select>


<div id="qrisBox" style="display:none">

<img id="qrTicket">

</div>


<div id="ewalletBox" style="display:none">

<select id="wallet">

<option>GoPay</option>
<option>DANA</option>
<option>ShopeePay</option>
<option>OVO</option>

</select>

</div>

<button onclick="payNow()">Pay Now</button>

</div>

</div>


<script src="script.js"></script>

</body>
</html>
