<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>XXI Cinema</title>
<link rel="stylesheet" href="style.css">

<style>

body{
font-family:Arial;
background:#0f0f0f;
color:white;
margin:0;
text-align:center;
}

h1{
margin-top:30px;
}

.movies{
display:flex;
justify-content:center;
gap:30px;
margin-top:40px;
flex-wrap:wrap;
}

.movie{
background:#1c1c1c;
padding:15px;
border-radius:10px;
width:200px;
}

.movie img{
width:100%;
border-radius:8px;
}

.movie button{
margin-top:10px;
width:100%;
padding:10px;
border:none;
background:gold;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.ticketHistory{
margin-top:50px;
}

.ticket{
background:#1c1c1c;
padding:15px;
margin:10px auto;
width:250px;
border-radius:8px;
}

.ticket button{
margin-top:10px;
padding:6px 10px;
cursor:pointer;
}

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}

.popup-content{
background:#1c1c1c;
padding:20px;
border-radius:10px;
width:300px;
}

.popup select{
width:100%;
padding:8px;
margin-top:10px;
}

.popup button{
margin-top:15px;
padding:10px;
width:100%;
background:gold;
border:none;
border-radius:6px;
cursor:pointer;
}

.qr{
margin-top:10px;
}

</style>

</head>
<body>

<h1>🎬 XXI Cinema</h1>

<div class="movies">

<div class="movie">
<img src="https://m.media-amazon.com/images/I/81ExhpBEbHL.jpg">
<h3>Avengers Endgame</h3>
<button onclick="buyTicket('Avengers Endgame')">Buy Ticket</button>
</div>

<div class="movie">
<img src="https://m.media-amazon.com/images/I/51EbJjlLgRL.jpg">
<h3>The Dark Knight</h3>
<button onclick="buyTicket('The Dark Knight')">Buy Ticket</button>
</div>

<div class="movie">
<img src="https://m.media-amazon.com/images/I/71yVq+Y8i-L._AC_SL1000_.jpg">
<h3>Interstellar</h3>
<button onclick="buyTicket('Interstellar')">Buy Ticket</button>
</div>

</div>


<!-- TICKET HISTORY -->

<div class="ticketHistory">

<h2>Ticket History</h2>

<div id="ticketHistory"></div>

</div>


<!-- POPUP PAYMENT -->

<div id="paymentPopup" class="popup">

<div class="popup-content">

<h3>Pilih Metode Pembayaran</h3>

<select id="paymentMethod" onchange="changePayment()">

<option value="">Pilih metode</option>
<option value="qris">QRIS</option>
<option value="ewallet">E-Wallet</option>

</select>


<div id="qrisBox" style="display:none" class="qr">

<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=XXICINEMA_PAYMENT">

</div>


<div id="ewalletBox" style="display:none">

<select id="wallet">

<option>GoPay</option>
<option>DANA</option>
<option>ShopeePay</option>
<option>OVO</option>
<option>Bank BCA</option>
<option>Bank BRI</option>
<option>Bank Mandiri</option>

</select>

</div>

<button onclick="payNow()">Bayar Sekarang</button>

<button onclick="closePopup()">Batal</button>

</div>

</div>


<script src="script.js"></script>

</body>
</html>
