<!DOCTYPE html>
<html>
<head>

<title>XXI Cinema</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>XXI Cinema</h1>

<nav>

<a href="#">Home</a>
<a href="#">Now Playing</a>
<a href="#">Coming Soon</a>

</nav>

</header>


<section class="movie-section">

<h2>Now Playing</h2>

<div class="movie-container">

<div class="movie">

<img src="https://image.tmdb.org/t/p/w500/or06FN3Dka5tukK1e9sl16pB3iy.jpg">

<h3>Avengers Endgame</h3>

<div class="rating">⭐⭐⭐⭐⭐</div>

<button onclick="trailer('https://www.youtube.com/embed/TcMBFSGVi1c')">Trailer</button>

<button onclick="buyTicket('Avengers Endgame')">Buy Ticket</button>

</div>


<div class="movie">

<img src="https://image.tmdb.org/t/p/w500/qJ2tW6WMUDux911r6m7haRef0WH.jpg">

<h3>The Dark Knight</h3>

<div class="rating">⭐⭐⭐⭐⭐</div>

<button onclick="trailer('https://www.youtube.com/embed/EXeTwQWrcwY')">Trailer</button>

<button onclick="buyTicket('The Dark Knight')">Buy Ticket</button>

</div>


<div class="movie">

<img src="https://image.tmdb.org/t/p/w500/gEU2QniE6E77NI6lCU6MxlNBvIx.jpg">

<h3>Interstellar</h3>

<div class="rating">⭐⭐⭐⭐⭐</div>

<button onclick="trailer('https://www.youtube.com/embed/zSWdZVtXT7E')">Trailer</button>

<button onclick="buyTicket('Interstellar')">Buy Ticket</button>

</div>

</div>

</section>



<section class="history">

<h2>Ticket History</h2>

<table>

<thead>

<tr>

<th>Movie</th>
<th>Seat</th>
<th>Payment</th>
<th>Total</th>
<th>QR</th>
<th>Receipt</th>

</tr>

</thead>

<tbody id="ticketHistory"></tbody>

</table>

</section>



<div class="popup" id="seatPopup">

<div class="popup-box">

<h3>Select Seat</h3>

<div id="seats"></div>

<button onclick="continuePayment()">Continue</button>

</div>

</div>



<div class="popup" id="paymentPopup">

<div class="popup-box">

<h3>Payment Method</h3>

<select id="paymentMethod">

<option value="QRIS">QRIS</option>
<option value="GoPay">GoPay</option>
<option value="Dana">Dana</option>
<option value="OVO">OVO</option>

</select>

<button onclick="pay()">Pay</button>

</div>

</div>



<div class="popup" id="trailerPopup">

<div class="popup-box">

<iframe id="video" width="600" height="350"></iframe>

<br>

<button onclick="closeTrailer()">Close</button>

</div>

</div>


<script src="script.js"></script>

</body>
</html>
